{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}
{% block main-content %}
<div class="container text-center py-5 my-5">
    <div style="font-size:6rem;line-height:1">🔍</div>
    <h1 style="font-family:'Montserrat',sans-serif;font-weight:900;font-size:5rem;color:var(--primary);line-height:1">404</h1>
    <h3 class="fw-bold mt-2 mb-3">Page Not Found</h3>
    <p class="text-muted mb-4">The page you're looking for doesn't exist or has been moved.</p>
    <div class="d-flex gap-3 justify-content-center flex-wrap">
        <a href="{% url 'home' %}" class="btn btn-primary px-4 py-2">
            <i class="bi bi-house me-2"></i>Go Home
        </a>
        <a href="{% url 'products' %}" class="btn btn-outline-primary px-4 py-2" style="color:var(--primary)!important;border-color:var(--primary)!important">
            <i class="bi bi-bag me-2"></i>Browse Products
        </a>
    </div>
</div>
{% endblock %}
