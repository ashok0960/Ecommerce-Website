{% extends "base.html" %}
{% block title %}Server Error{% endblock %}
{% block main-content %}
<div class="container text-center py-5 my-5">
    <div style="font-size:6rem;line-height:1">⚠️</div>
    <h1 style="font-family:'Montserrat',sans-serif;font-weight:900;font-size:5rem;color:var(--danger);line-height:1">500</h1>
    <h3 class="fw-bold mt-2 mb-3">Server Error</h3>
    <p class="text-muted mb-4">Something went wrong on our end. We're working to fix it.</p>
    <div class="d-flex gap-3 justify-content-center flex-wrap">
        <a href="{% url 'home' %}" class="btn btn-primary px-4 py-2">
            <i class="bi bi-house me-2"></i>Go Home
        </a>
        <a href="{% url 'contact' %}" class="btn btn-outline-secondary px-4 py-2">
            <i class="bi bi-headset me-2"></i>Contact Support
        </a>
    </div>
</div>
{% endblock %}
